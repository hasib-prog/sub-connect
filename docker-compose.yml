version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: subconnect_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-subconnect}
      POSTGRES_USER: ${POSTGRES_USER:-subconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subconnect}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [subconnect]

  redis:
    image: redis:7-alpine
    container_name: subconnect_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?err}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [subconnect]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: subconnect_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-subconnect}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-subconnect}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [subconnect]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:5000}
    container_name: subconnect_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks: [subconnect]

  nginx:
    image: nginx:1.27-alpine
    container_name: subconnect_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks: [subconnect]

volumes:
  postgres_data:
  redis_data:

networks:
  subconnect:
    driver: bridge
